<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Contexto" />
  <meta name="description" content="Descubra a palavra secreta pela proximidade semântica" />

  <!-- Open Graph -->
  <meta property="og:title" content="Contexto BR" />
  <meta property="og:description" content="Jogo de palavras por similaridade semântica em português" />
  <meta property="og:type" content="website" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" />

  <title>Contexto BR</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Literata:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #14141c;
      --border:   #1f1f2e;
      --text:     #e8e8f0;
      --muted:    #5a5a7a;
      --accent:   #00e676;
      --font-body: 'Literata', Georgia, serif;
      --font-display: 'Bebas Neue', Impact, sans-serif;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left:   env(safe-area-inset-left, 0px);
      --safe-right:  env(safe-area-inset-right, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    button { font-family: var(--font-body); cursor: pointer; }
    input  { font-family: var(--font-body); }

    /* ─── Animations ───────────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
    @keyframes winGlow {
      0%, 100% { box-shadow: 0 0 20px #00e67640; }
      50%       { box-shadow: 0 0 40px #00e676aa; }
    }

    /* ─── Home Screen ──────────────────────────────────────────────────────── */
    .home {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: calc(var(--safe-top) + 24px) calc(var(--safe-left) + 20px) calc(var(--safe-bottom) + 24px) calc(var(--safe-right) + 20px);
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, #00e67612 0%, transparent 70%),
        var(--bg);
    }

    .home-inner {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeUp 0.6s ease both;
    }

    .home-badge {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 5px 14px;
      border-radius: 20px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: clamp(64px, 18vw, 100px);
      letter-spacing: 14px;
      color: var(--text);
      text-shadow: 0 0 60px #ffffff18;
      line-height: 1;
    }

    .tagline {
      font-size: clamp(14px, 3.5vw, 17px);
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
    }

    .mode-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: clamp(18px, 5vw, 28px) 16px;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: border-color 0.2s, transform 0.15s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .mode-btn:hover, .mode-btn:active {
      border-color: #00e67650;
      background: #00e67608;
      transform: translateY(-2px);
    }
    .mode-btn strong { font-size: clamp(14px, 3.5vw, 16px); }
    .mode-btn small  { font-size: 12px; color: var(--muted); font-style: italic; }

    .mode-icon { font-size: clamp(28px, 7vw, 36px); }

    .howto {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: clamp(14px, 4vw, 20px);
      width: 100%;
    }
    .howto p { font-size: 13px; color: #aaa; line-height: 1.7; margin-bottom: 12px; }
    .howto p:last-child { margin-bottom: 0; }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .leg { font-size: 12px; }

    /* ─── Game Screen ──────────────────────────────────────────────────────── */
    .game {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: calc(var(--safe-bottom) + 12px);
    }

    /* Header */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(var(--safe-top) + 12px) 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:hover { color: var(--text); border-color: #444; }

    .hdr-logo {
      font-family: var(--font-display);
      font-size: clamp(22px, 6vw, 30px);
      letter-spacing: 6px;
      color: var(--text);
    }

    .hdr-badge {
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* Win / Reveal banners */
    .win-banner {
      margin: 14px 14px 0;
      background: linear-gradient(135deg, #003812, #003828);
      border: 1px solid #00e67640;
      border-radius: 14px;
      padding: 16px 18px;
      animation: winGlow 2s ease infinite;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .win-top { font-size: 16px; color: #b9fbc0; font-weight: 600; }
    .win-sub { font-size: 13px; color: #69f0ae; }

    .reveal-banner {
      margin: 14px 14px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 14px;
      color: #aaa;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .play-again-btn {
      align-self: flex-start;
      background: var(--accent);
      color: #002a14;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-weight: 700;
      font-size: 14px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s;
    }
    .play-again-btn:hover { opacity: 0.85; }

    /* Input */
    .input-wrap {
      display: flex;
      gap: 10px;
      padding: 14px 14px 6px;
    }

    .guess-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: clamp(15px, 4vw, 17px);
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .guess-input:focus { border-color: #00e67660; }
    .guess-input::placeholder { color: var(--muted); }
    .guess-input:disabled { opacity: 0.5; }

    .send-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .send-btn:hover:not(:disabled) { opacity: 0.85; transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.4; }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #33333340;
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: block;
    }

    .err-msg {
      min-height: 18px;
      font-size: 12px;
      color: #ef5350;
      padding: 0 14px;
      font-style: italic;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 6px 14px 10px;
      flex-wrap: wrap;
    }
    .stat { font-size: 13px; color: var(--muted); }
    .stat strong { color: var(--text); }

    .give-up-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 12px;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .give-up-btn:hover { color: #ef5350; border-color: #ef535050; }

    /* Proximity bar */
    .bar-wrap {
      padding: 0 14px 10px;
    }
    .bar-label {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .bar-track {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    /* Guess list */
    .guesses-list {
      flex: 1;
      padding: 4px 12px 12px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .guess-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 13px;
      border-radius: 11px;
      background: var(--rank-color, #fff)12;
      border: 1.5px solid var(--rank-color, #fff)30;
      margin-bottom: 6px;
      animation: slideIn 0.25s ease both;
    }
    .guess-win {
      background: linear-gradient(90deg, #00e67618, #69f0ae10);
      border-color: #00e67660;
    }

    .guess-num {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--muted);
      width: 26px;
      text-align: right;
      flex-shrink: 0;
    }

    .guess-word {
      flex: 1;
      font-size: clamp(15px, 4vw, 17px);
      font-weight: 600;
      color: var(--text);
      text-transform: capitalize;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .guess-rank {
      font-family: var(--font-display);
      font-size: clamp(18px, 4.5vw, 22px);
      flex-shrink: 0;
      letter-spacing: 1px;
    }

    .guess-label {
      font-size: 10px;
      border: 1px solid;
      border-radius: 20px;
      padding: 2px 8px;
      flex-shrink: 0;
      white-space: nowrap;
      font-weight: 600;
      display: none; /* shown only on wider screens */
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      font-size: 15px;
      animation: fadeUp 0.5s ease;
    }
    .empty-icon { font-size: 52px; }

    /* ─── Responsive ────────────────────────────────────────────────────────── */
    @media (min-width: 400px) {
      .guess-label { display: inline-block; }
    }

    @media (min-width: 480px) {
      .mode-btn { padding: 28px 20px; }
      .hdr { padding: calc(var(--safe-top) + 14px) 20px 14px; }
      .input-wrap { padding: 16px 16px 8px; }
      .guesses-list { padding: 4px 16px 16px; }
      .stats-bar { padding: 8px 16px 12px; }
      .bar-wrap { padding: 0 16px 12px; }
    }

    @media (min-width: 600px) {
      .home-inner { gap: 28px; }
      .mode-grid { gap: 18px; }
    }

    /* Landscape phones */
    @media (max-height: 500px) and (orientation: landscape) {
      .logo { font-size: 48px; }
      .home-inner { gap: 12px; }
      .mode-btn { padding: 12px 16px; }
      .mode-icon { font-size: 22px; }
    }

    /* ─── PWA Install Banner ─────────────────────────────────────────────────── */
    #install-banner {
      display: none;
      position: fixed;
      bottom: calc(var(--safe-bottom) + 12px);
      left: 12px;
      right: 12px;
      background: var(--surface);
      border: 1px solid #00e67640;
      border-radius: 14px;
      padding: 14px 16px;
      z-index: 100;
      box-shadow: 0 8px 32px #00000080;
      animation: fadeUp 0.4s ease;
      display: none;
      align-items: center;
      gap: 12px;
    }
    #install-banner.visible { display: flex; }
    #install-banner p { flex: 1; font-size: 13px; color: #aaa; line-height: 1.5; }
    #install-banner p strong { color: var(--text); }

    .install-btn {
      background: var(--accent);
      color: #002a14;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }
    .dismiss-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
      padding: 4px;
    }

    /* ─── Model Loading ──────────────────────────────────────────────────────── */
    .model-loading {
      display: flex; align-items: center; gap: 14px;
      margin: 14px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 16px 18px; animation: pulse 1.5s ease infinite;
    }
    .model-loading strong { display: block; font-size: 14px; color: var(--text); margin-bottom: 3px; }
    .model-loading small  { font-size: 12px; color: var(--muted); font-style: italic; }
    .model-spinner {
      width: 36px; height: 36px; flex-shrink: 0;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .tech-note { font-size: 12px; color: #333350; text-align: center; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- PWA Install Banner -->
  <div id="install-banner">
    <p><strong>Instalar Contexto</strong><br>Adicione à tela inicial para jogar como um app!</p>
    <button class="install-btn" id="install-btn">Instalar</button>
    <button class="dismiss-btn" id="dismiss-btn">✕</button>
  </div>

  <script src="app.js"></script>
  <script>
    // ── PWA Install prompt ──────────────────────────────────────────────────
    let deferredPrompt = null;
    const banner  = document.getElementById("install-banner");
    const installBtn = document.getElementById("install-btn");
    const dismissBtn = document.getElementById("dismiss-btn");

    window.addEventListener("beforeinstallprompt", e => {
      e.preventDefault();
      deferredPrompt = e;
      // Show after 5s if not dismissed
      setTimeout(() => {
        if (!localStorage.getItem("pwa-dismissed")) {
          banner.classList.add("visible");
        }
      }, 5000);
    });

    installBtn?.addEventListener("click", async () => {
      banner.classList.remove("visible");
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === "accepted") localStorage.setItem("pwa-dismissed", "1");
        deferredPrompt = null;
      }
    });

    dismissBtn?.addEventListener("click", () => {
      banner.classList.remove("visible");
      localStorage.setItem("pwa-dismissed", "1");
    });

    window.addEventListener("appinstalled", () => {
      banner.classList.remove("visible");
      deferredPrompt = null;
    });
  </script>
</body>
</html>
